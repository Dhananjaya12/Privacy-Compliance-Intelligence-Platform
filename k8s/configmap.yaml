apiVersion: v1
kind: ConfigMap
metadata:
  name: pdf-rag-config
  namespace: pdf-rag
  labels:
    app.kubernetes.io/name: pdf-rag-agent
data:
  APP_NAME: "PDF RAG Agent API"
  APP_VERSION: "1.0.0"
  DEBUG: "false"
  LOG_LEVEL: "INFO"

  DATA_DIR: "/app/data"
  CONFIG_PATH: "/app/config/default.json"

  CHUNK_STRATEGY: "token"
  TOKEN_CHUNK_SIZE: "512"
  TOKEN_CHUNK_OVERLAP: "100"
  EMBEDDING_MODEL: "sentence-transformers/all-MiniLM-L6-v2"
  CHUNKING_LLM_MODEL: "meta-llama/Llama-3.1-8B-Instruct"

  VECTORSTORE_TYPE: "faiss"
  VECTORSTORE_TOP_K: "5"

  LLM_MODEL_NAME: "meta-llama/Llama-3.1-8B-Instruct"
  LLM_MAX_NEW_TOKENS: "300"
  LLM_TEMPERATURE: "0.0000000001"
  DEVICE: "cpu"
