# ⚠️  DO NOT commit real values to version control.
# Populate with base64-encoded values:
#   echo -n "your_key_here" | base64
# Or use a secrets manager (Vault, AWS Secrets Manager, Sealed Secrets, etc.)

apiVersion: v1
kind: Secret
metadata:
  name: pdf-rag-secrets
  namespace: pdf-rag
  labels:
    app.kubernetes.io/name: pdf-rag-agent
type: Opaque
data:
  # base64-encoded HuggingFace token
  HUGGING_FACE_API: REPLACE_WITH_BASE64_ENCODED_HF_TOKEN

  # base64-encoded Tavily API key
  TAVILY_API_KEY: REPLACE_WITH_BASE64_ENCODED_TAVILY_KEY

  # base64-encoded pgvector connection string (optional)
  # PGVECTOR_CONNECTION: REPLACE_WITH_BASE64_ENCODED_CONNECTION_STRING
