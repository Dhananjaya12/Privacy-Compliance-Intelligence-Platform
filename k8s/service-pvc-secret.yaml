apiVersion: v1
kind: Service
metadata:
  name: pdf-rag-api
  namespace: default
spec:
  selector:
    app: pdf-rag-api
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP

---

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pdf-rag-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi

---

# Create with: kubectl create secret generic pdf-rag-secrets \
#   --from-literal=HUGGING_FACE_API=hf_xxx \
#   --from-literal=TAVILY_API_KEY=tvly_xxx
apiVersion: v1
kind: Secret
metadata:
  name: pdf-rag-secrets
  namespace: default
type: Opaque
data: {}  # populate via kubectl or a secrets manager
