apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rag-data-pvc
  namespace: pdf-rag
  labels:
    app.kubernetes.io/name: pdf-rag-agent
spec:
  accessModes:
    - ReadWriteOnce        # Use ReadWriteMany (NFS/EFS) for multi-replica writes
  storageClassName: standard   # ← update to your cluster's storage class
  resources:
    requests:
      storage: 20Gi
